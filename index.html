<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#15151f">
  <title>Imagegen Prompt Vault</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <p class="muted">local PWA / IndexedDB</p>
  <h1>Imagegen</h1>
  <p class="lead">画像・プロンプト・キャラカード・シーンテンプレを端末内に保存して、生成時にすぐ組み立てる保管庫。</p>
  <div class="row"><span id="status" class="status">起動中</span><button id="install" class="hide">インストール</button></div>
</header>
<nav>
  <button class="nav-btn on" data-tab="library">保存庫</button>
  <button class="nav-btn" data-tab="item-editor">追加・編集</button>
  <button class="nav-btn" data-tab="characters">キャラ</button>
  <button class="nav-btn" data-tab="scenes">シーン</button>
  <button class="nav-btn" data-tab="builder">組み立て</button>
  <button class="nav-btn" data-tab="data">データ</button>
</nav>
<main>
<section id="library" class="tab on">
  <div class="card"><h2>保存庫</h2><input id="librarySearch" placeholder="検索。タイトル、タグ、プロンプト"><p id="libraryCount" class="muted"></p></div>
  <div id="libraryList" class="grid"></div>
</section>
<section id="item-editor" class="tab">
  <form id="itemForm" class="card stack gap-m">
    <div class="row between"><h2>画像＋プロンプト</h2><span id="itemMode" class="muted">新規作成</span></div>
    <input id="itemId" type="hidden">
    <label>画像</label><input id="itemImage" type="file" accept="image/*">
    <div id="itemPreviewWrap" class="hide"><img id="itemPreview" class="thumb preview" alt="preview"><div class="row"><button id="removeItemImage" type="button">画像を外す</button></div></div>
    <label>タイトル</label><input id="itemTitle" placeholder="例：夜の部屋のひかちゃん">
    <label>プロンプト</label><textarea id="itemPrompt"></textarea>
    <label>タグ（カンマ区切り）</label><input id="itemTags" placeholder="ひかちゃん, 夜, アニメ調">
    <div class="row"><button class="pri" type="submit">保存</button><button id="cancelItemEdit" type="button" class="hide">編集をやめる</button></div>
  </form>
</section>
<section id="characters" class="tab">
  <div class="grid two-col-wide">
    <form id="charForm" class="card stack gap-m">
      <div class="row between"><h2>キャラカード</h2><span id="charMode" class="muted">新規作成</span></div>
      <input id="charId" type="hidden">
      <label>名前</label><input id="charName" placeholder="ひかちゃん">
      <label>一括貼り付け</label><textarea id="charRaw" placeholder="既存の長いキャラプロンプトをここに貼って『分解する』"></textarea>
      <div class="row"><button id="parseCharPrompt" type="button">分解する</button><button id="clearCharRaw" type="button">一括欄を空にする</button></div>
      <details class="fold" open><summary>項目別プロンプト</summary>
        <label>基本</label><textarea id="charBase" placeholder="年齢、体格、顔立ちなど"></textarea>
        <label>髪</label><textarea id="charHair" placeholder="髪型、前髪、髪色など"></textarea>
        <label>服</label><textarea id="charOutfit" placeholder="服装"></textarea>
        <label>小物</label><textarea id="charAccessories" placeholder="眼鏡、アクセサリーなど"></textarea>
        <label>その他</label><textarea id="charOther" placeholder="必要なら補足"></textarea>
        <label>ネガティブ</label><textarea id="charNegative" placeholder="Negative prompt"></textarea>
        <label>タグ（保存用。組み立て時には使わない）</label><input id="charTags" placeholder="anime, main character">
      </details>
      <div class="row"><button class="pri" type="submit">保存</button><button id="cancelCharEdit" type="button" class="hide">編集をやめる</button></div>
    </form>
    <div class="card"><h2>登録済みキャラ</h2><p class="muted">本文はデフォルト折りたたみ。</p><div id="characterList" class="stack gap-s"></div></div>
  </div>
</section>
<section id="scenes" class="tab">
  <div class="grid two-col-wide">
    <form id="sceneForm" class="card stack gap-m">
      <div class="row between"><h2>シーン / 共通プロンプト</h2><span id="sceneMode" class="muted">新規作成</span></div>
      <input id="sceneId" type="hidden">
      <label>名前</label><input id="sceneName" placeholder="例：共通画風 / 雨の駅 / 室内光">
      <label>本文</label><textarea id="scenePrompt" placeholder="毎回使う共通画風やシーンを保存"></textarea>
      <label>タグ（保存用）</label><input id="sceneTags" placeholder="style, rainy">
      <div class="row"><button class="pri" type="submit">保存</button><button id="cancelSceneEdit" type="button" class="hide">編集をやめる</button></div>
    </form>
    <div class="card"><h2>登録済みシーン</h2><div id="sceneList" class="stack gap-s"></div></div>
  </div>
</section>
<section id="builder" class="tab">
  <div class="grid builder-grid">
    <div class="card stack gap-m"><h2>キャラ選択</h2><div id="builderCharacters" class="stack gap-s"></div></div>
    <div class="card stack gap-m"><h2>共通プロンプト / シーン</h2><p class="muted">保存済みテンプレを選ぶ。自由入力も併用できる。</p><div id="builderScenes" class="stack gap-s"></div><label>自由入力</label><textarea id="builderExtra" placeholder="rainy train station, soft lighting, anime style"></textarea><button id="saveBuilderScene" type="button">自由入力をシーンとして保存</button></div>
    <div class="card stack gap-m"><h2>出力</h2><p class="muted">キャラタグとネガティブは自動では入れない。</p><textarea id="builderOutput" class="mono"></textarea><div class="row"><button id="buildPrompt" class="pri" type="button">組み立て</button><button id="copyOutput" type="button">コピー</button><button id="saveOutputOnly" type="button">プロンプトだけ保存</button></div></div>
  </div>
</section>
<section id="data" class="tab">
  <div class="grid"><div class="card stack gap-m"><h2>エクスポート</h2><button id="exportData" class="pri" type="button">JSONを書き出す</button></div><div class="card stack gap-m"><h2>インポート</h2><input id="importFile" type="file" accept="application/json"><button id="importData" type="button">読み込む</button><button id="wipeData" type="button" class="danger">全削除</button></div></div>
  <div class="card stack gap-m"><h2>デバッグログ</h2><pre id="debugLog" class="log"></pre></div>
</section>
</main>
<div id="toast" class="toast hide"></div>
<script src="app.js"></script>
</body>
</html>
