<!doctype html><html lang=ja><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=theme-color content='#15151f'><title>Imagegen</title><link rel=manifest href=manifest.json><link rel=icon href=icon.svg><style>:root{color-scheme:dark;--bg:#101018;--p:#19192a;--p2:#24243a;--t:#f6f2ff;--m:#aaa5c0;--a:#a99cff;--b:#f1b9ff;--l:rgba(255,255,255,.13);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 0 0,#30285c,var(--bg) 34rem);color:var(--t)}header,main,nav{padding:18px clamp(14px,4vw,46px)}h1{font-size:clamp(2.2rem,7vw,5rem);margin:.1rem 0;letter-spacing:-.06em}h2{margin:.2rem 0 1rem}.lead,.muted{color:var(--m)}nav{display:flex;gap:8px;overflow:auto;padding-top:0}button{border:1px solid var(--l);background:var(--p2);color:var(--t);border-radius:999px;padding:.7rem 1rem;font-weight:700}button.on,.pri{background:linear-gradient(135deg,var(--a),var(--b));color:#15131f;border:0}.danger{color:#ffb7b7}.tab{display:none}.tab.on{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--l);border-radius:24px;padding:16px;margin-bottom:14px}input,textarea{width:100%;border:1px solid var(--l);background:rgba(0,0,0,.24);color:var(--t);border-radius:14px;padding:.75rem;font:inherit}textarea{min-height:8rem}label{display:block;margin:.7rem 0 .28rem;color:var(--m)}img.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:18px;background:#090910}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.tag{font-size:.78rem;background:rgba(255,255,255,.1);border:1px solid var(--l);border-radius:999px;padding:.2rem .55rem}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--t);color:#161523;border-radius:999px;padding:.75rem 1rem;font-weight:800}.hide{display:none}.check{display:flex;gap:8px;border:1px solid var(--l);border-radius:14px;padding:10px;margin:7px 0}.check input{width:auto}.mono{font-family:ui-monospace,Menlo,Consolas,monospace}</style></head><body><header><p class=muted>local PWA / IndexedDB</p><h1>Imagegen</h1><p class=lead>画像・プロンプト・キャラカードを端末内に保存して、生成時にすぐコピーする保管庫。</p><button id=install class='hide'>インストール</button></header><nav><button class='n on' data-t=lib>保存庫</button><button class=n data-t=add>追加</button><button class=n data-t=char>キャラ</button><button class=n data-t=build>組み立て</button><button class=n data-t=data>データ</button></nav><main><section id=lib class='tab on'><div class=card><h2>保存庫</h2><input id=q placeholder='検索。タイトル、タグ、プロンプト'><p class=muted id=count></p></div><div id=list class=grid></div></section><section id=add class=tab><form id=f class=card><h2>画像＋プロンプト</h2><label>画像</label><input id=img type=file accept='image/*'><label>タイトル</label><input id=title placeholder='例：夜の部屋のひかちゃん'><label>プロンプト</label><textarea id=prompt></textarea><label>タグ（カンマ区切り）</label><input id=tags placeholder='ひかちゃん, 夜, アニメ調'><button class=pri>保存</button></form></section><section id=char class=tab><div class=grid><form id=cf class=card><h2>キャラカード</h2><label>名前</label><input id=cn placeholder='ひかちゃん'><label>固定プロンプト</label><textarea id=cp placeholder='silver short hair, sharp eyes...'></textarea><label>タグ</label><input id=ct placeholder='AI girl, anime style'><button class=pri>保存</button></form><div class=card><h2>登録済み</h2><div id=chars></div></div></div></section><section id=build class=tab><div class=grid><div class=card><h2>組み立て</h2><div id=pick></div><label>シーン・構図・追加要素</label><textarea id=extra placeholder='rainy train station, two characters, soft lighting'></textarea><button id=make class=pri>生成</button><button id=savep>プロンプトだけ保存</button></div><div class=card><h2>出力</h2><textarea id=out class=mono></textarea><button id=copyout class=pri>コピー</button></div></div></section><section id=data class=tab><div class=grid><div class=card><h2>エクスポート</h2><button id=ex class=pri>JSONを書き出す</button></div><div class=card><h2>インポート</h2><input id=im type=file accept='application/json'><button id=imp>読み込む</button><button id=wipe class=danger>全削除</button></div></div></section></main><div id=toast class='toast hide'></div><script>const $=q=>document.querySelector(q),$$=q=>[...document.querySelectorAll(q)];let db,items=[],chars=[],defer;const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random(),tags=s=>(s||'').split(',').map(x=>x.trim()).filter(Boolean),msg=s=>{toast.textContent=s;toast.classList.remove('hide');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.add('hide'),1600)},esc=s=>String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function odb(){return new Promise((ok,ng)=>{let r=indexedDB.open('imagegen-vault',1);r.onupgradeneeded=()=>{let d=r.result;if(!d.objectStoreNames.contains('items'))d.createObjectStore('items',{keyPath:'id'});if(!d.objectStoreNames.contains('chars'))d.createObjectStore('chars',{keyPath:'id'})};r.onsuccess=()=>ok(r.result);r.onerror=()=>ng(r.error)})}function st(n,m='readonly'){return db.transaction(n,m).objectStore(n)}function all(n){return new Promise((ok,ng)=>{let r=st(n).getAll();r.onsuccess=()=>ok(r.result);r.onerror=()=>ng(r.error)})}function put(n,v){return new Promise((ok,ng)=>{let r=st(n,'readwrite').put(v);r.onsuccess=()=>ok(v);r.onerror=()=>ng(r.error)})}function del(n,id){return new Promise((ok,ng)=>{let r=st(n,'readwrite').delete(id);r.onsuccess=ok;r.onerror=()=>ng(r.error)})}function clr(n){return new Promise((ok,ng)=>{let r=st(n,'readwrite').clear();r.onsuccess=ok;r.onerror=()=>ng(r.error)})}async function load(){items=(await all('items')).sort((a,b)=>b.at-a.at);chars=(await all('chars')).sort((a,b)=>a.name.localeCompare(b.name,'ja'));draw();drawChars()}function url(b){return b?URL.createObjectURL(b):''}async function text(s){await navigator.clipboard.writeText(s||'');msg('コピーした')}function dl(b,n){let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;document.body.append(a);a.click();a.remove()}async function png(b){let im=await createImageBitmap(b),c=document.createElement('canvas');c.width=im.width;c.height=im.height;c.getContext('2d').drawImage(im,0,0);return new Promise(r=>c.toBlob(r,'image/png'))}async function copyImg(i){if(!i.img)return msg('画像なし');try{let b=i.img.type==='image/png'?i.img:await png(i.img);await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);msg('画像コピー')}catch(e){dl(i.img,'imagegen.png');msg('画像コピー不可。DLした')}}function draw(){let q=$('#q').value.toLowerCase(),a=items.filter(i=>[i.title,i.prompt,(i.tags||[]).join(',')].join(' ').toLowerCase().includes(q));count.textContent=`${a.length}件`;list.innerHTML=a.length?a.map(i=>`<article class=card data-id='${i.id}'><h3>${esc(i.title||'無題')}</h3>${i.img?`<img class=thumb src='${url(i.img)}'>`:''}<p class=muted>${esc((i.prompt||'').slice(0,120))}</p><p>${(i.tags||[]).map(t=>`<span class=tag>${esc(t)}</span>`).join(' ')}</p><div class=row><button data-a=p>プロンプト</button><button data-a=i>画像</button><button data-a=d class=danger>削除</button></div></article>`).join(''):'<div class=card><p class=muted>保存データなし。</p></div>'}function drawChars(){chars.innerHTML=chars.length?chars.map(c=>`<div class=card data-c='${c.id}'><h3>${esc(c.name)}</h3><p class=muted>${esc(c.prompt)}</p><p>${(c.tags||[]).map(t=>`<span class=tag>${esc(t)}</span>`).join(' ')}</p><button data-ca=copy>コピー</button><button data-ca=del class=danger>削除</button></div>`).join(''):'<p class=muted>未登録。</p>';pick.innerHTML=chars.length?chars.map(c=>`<label class=check><input type=checkbox value='${c.id}'><span><b>${esc(c.name)}</b><br><span class=muted>${esc(c.prompt.slice(0,80))}</span></span></label>`).join(''):'<p class=muted>キャラを登録する。</p>'}function built(){let cs=$$('#pick input:checked').map(x=>chars.find(c=>c.id===x.value)).filter(Boolean);return [cs.map(c=>`${c.name}: ${c.prompt}, ${(c.tags||[]).join(', ')}`).join(String.fromCharCode(10)),extra.value].filter(Boolean).join(String.fromCharCode(10,10))}document.addEventListener('click',async e=>{if(e.target.matches('.n')){$$('.n').forEach(b=>b.classList.toggle('on',b===e.target));$$('.tab').forEach(s=>s.classList.toggle('on',s.id===e.target.dataset.t))}let card=e.target.closest('[data-id]');if(card&&e.target.dataset.a){let i=items.find(x=>x.id===card.dataset.id),a=e.target.dataset.a;if(a==='p')text(i.prompt);if(a==='i')copyImg(i);if(a==='d'&&confirm('削除する？')){await del('items',i.id);await load();msg('削除')}}let cc=e.target.closest('[data-c]');if(cc&&e.target.dataset.ca){let c=chars.find(x=>x.id===cc.dataset.c);if(e.target.dataset.ca==='copy')text(`${c.name}: ${c.prompt}`);if(e.target.dataset.ca==='del'&&confirm('削除する？')){await del('chars',c.id);await load();msg('削除')}}});q.oninput=draw;f.onsubmit=async e=>{e.preventDefault();let file=img.files[0]||null;if(!file&&!prompt.value.trim())return msg('画像かプロンプトが必要');await put('items',{id:uid(),title:title.value.trim(),prompt:prompt.value.trim(),tags:tags(tags.value),img:file,at:Date.now()});f.reset();await load();msg('保存')};cf.onsubmit=async e=>{e.preventDefault();if(!cn.value.trim())return msg('名前が必要');await put('chars',{id:uid(),name:cn.value.trim(),prompt:cp.value.trim(),tags:tags(ct.value),at:Date.now()});cf.reset();await load();msg('保存')};make.onclick=()=>{out.value=built();msg('生成')};copyout.onclick=()=>text(out.value||built());savep.onclick=async()=>{let p=out.value||built();if(!p)return msg('空');await put('items',{id:uid(),title:'組み立てプロンプト',prompt:p,tags:['prompt'],img:null,at:Date.now()});await load();msg('保存')};function dataurl(b){return new Promise(r=>{if(!b)return r(null);let fr=new FileReader;fr.onload=()=>r(fr.result);fr.readAsDataURL(b)})}ex.onclick=async()=>{let a=[];for(let i of items)a.push({...i,img:null,imgData:await dataurl(i.img)});dl(new Blob([JSON.stringify({items:a,chars})],{type:'application/json'}),'imagegen-vault.json')};imp.onclick=async()=>{let f=im.files[0];if(!f)return msg('JSONなし');let d=JSON.parse(await f.text());for(let i of d.items||[])await put('items',{...i,id:i.id||uid(),img:i.imgData?await fetch(i.imgData).then(r=>r.blob()):null,at:i.at||Date.now()});for(let c of d.chars||[])await put('chars',{...c,id:c.id||uid()});await load();msg('読込')};wipe.onclick=async()=>{if(confirm('全削除する？')){await clr('items');await clr('chars');await load();msg('全削除')}};window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();defer=e;install.classList.remove('hide')});install.onclick=async()=>{if(defer){defer.prompt();defer=null;install.classList.add('hide')}};if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');odb().then(d=>{db=d;load()}).catch(e=>msg('DB起動失敗'));</script></body></html>
